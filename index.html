<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL SCANNER - ARCADE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-yellow: #ffff00;
            --arcade-black: #0a0a0a;
        }

        body {
            background-color: var(--arcade-black);
            color: white;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            border: 10px solid #333;
        }

        #game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 20px;
            width: 95vw;
            height: 90vh;
            padding: 20px;
        }

        /* UI Elements */
        .header {
            grid-column: span 2;
            text-align: center;
            color: var(--neon-yellow);
            text-shadow: 3px 3px var(--neon-pink);
            font-size: 24px;
            animation: blink 1s infinite;
        }

        #item-display {
            grid-column: span 2;
            background: #222;
            border: 4px solid var(--neon-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        /* Player Stations */
        .player-zone {
            border: 4px padding;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
        }

        .p1 { border: 4px solid #ff4d4d; color: #ff4d4d; }
        .p2 { border: 4px solid #4dff4d; color: #4dff4d; }
        .p3 { border: 4px solid #4da6ff; color: #4da6ff; }
        .p4 { border: 4px solid #ffff4d; color: #ffff4d; }

        .score { font-size: 15px; margin-bottom: 10px; }
        .controls { font-size: 10px; color: #aaa; }

        .answer-slot {
            height: 40px;
            border: 2px dashed #666;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        button {
            padding: 20px 40px;
            font-family: 'Press Start 2P';
            background: var(--neon-pink);
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="start-screen" class="modal">
        <h1 style="color: var(--neon-blue)">GLOBAL SCANNER</h1>
        <p>4 PLAYERS - 1 WINNER</p>
        <button onclick="startGame()">INSERT COIN (START)</button>
    </div>

    <div id="game-container">
        <div class="header">WHICH COUNTRY MADE THIS?</div>

        <div id="item-display">
            <div id="item-icon" style="font-size: 80px;">?</div>
            <div id="item-name">GET READY!</div>
        </div>

        <div class="player-zone p1">
            <div>
                <div class="score">P1: <span id="s0">0</span></div>
                <div class="controls">KEYS: Q, W, E, R</div>
            </div>
            <div id="ans0" class="answer-slot">---</div>
        </div>

        <div class="player-zone p2">
            <div>
                <div class="score">P2: <span id="s1">0</span></div>
                <div class="controls">KEYS: T, Y, U, I</div>
            </div>
            <div id="ans1" class="answer-slot">---</div>
        </div>

        <div class="player-zone p3">
            <div>
                <div class="score">P3: <span id="s2">0</span></div>
                <div class="controls">KEYS: Z, X, C, V</div>
            </div>
            <div id="ans2" class="answer-slot">---</div>
        </div>

        <div class="player-zone p4">
            <div>
                <div class="score">P4: <span id="s3">0</span></div>
                <div class="controls">KEYS: B, N, M, ,</div>
            </div>
            <div id="ans3" class="answer-slot">---</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="beepSfx">
        <source src="https://actions.google.com/sounds/v1/foley/beeps_short_high_pitch.ogg" type="audio/ogg">
    </audio>

    <script>
        const gameData = [
            { item: "Ferrari", icon: "🏎️", options: ["Italy", "Germany", "France", "USA"], correct: 0 },
            { item: "Sushi", icon: "🍣", options: ["China", "Japan", "Korea", "Thailand"], correct: 1 },
            { item: "Ikea", icon: "🛋️", options: ["Norway", "Denmark", "Sweden", "Finland"], correct: 2 },
            { item: "Lego", icon: "🧱", options: ["Sweden", "Denmark", "USA", "Germany"], correct: 1 },
            { item: "Maple Syrup", icon: "🍁", options: ["Canada", "Russia", "USA", "UK"], correct: 0 },
            { item: "Taco", icon: "🌮", options: ["Spain", "Mexico", "Brazil", "Peru"], correct: 1 }
        ];

        let scores = [0, 0, 0, 0];
        let currentQuestion = 0;
        let canAnswer = false;

        const pKeys = {
            'q': {p: 0, a: 0}, 'w': {p: 0, a: 1}, 'e': {p: 0, a: 2}, 'r': {p: 0, a: 3},
            't': {p: 1, a: 0}, 'y': {p: 1, a: 1}, 'u': {p: 1, a: 2}, 'i': {p: 1, a: 3},
            'z': {p: 2, a: 0}, 'x': {p: 2, a: 1}, 'c': {p: 2, a: 2}, 'v': {p: 2, a: 3},
            'b': {p: 3, a: 0}, 'n': {p: 3, a: 1}, 'm': {p: 3, a: 2}, ',': {p: 3, a: 3}
        };

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('bgMusic').play();
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion >= gameData.length) {
                alert("GAME OVER! Final Scores: " + scores.join(" | "));
                location.reload();
                return;
            }

            const q = gameData[currentQuestion];
            document.getElementById('item-icon').innerText = q.icon;
            document.getElementById('item-name').innerText = q.item + " (" + q.options.join(" | ") + ")";
            
            // Reset player slots
            for(let i=0; i<4; i++) {
                document.getElementById(`ans${i}`).innerText = "???";
                document.getElementById(`ans${i}`).style.background = "none";
            }
            
            canAnswer = true;
        }

        window.addEventListener('keydown', (e) => {
            if (!canAnswer) return;
            const key = e.key.toLowerCase();
            
            if (pKeys[key]) {
                const choice = pKeys[key];
                const q = gameData[currentQuestion];
                
                document.getElementById('beepSfx').play();

                if (choice.a === q.correct) {
                    scores[choice.p] += 10;
                    document.getElementById(`s${choice.p}`).innerText = scores[choice.p];
                    document.getElementById(`ans${choice.p}`).innerText = "CORRECT!";
                    document.getElementById(`ans${choice.p}`).style.background = "green";
                    
                    // Brief pause before next question
                    canAnswer = false;
                    currentQuestion++;
                    setTimeout(nextQuestion, 1500);
                } else {
                    document.getElementById(`ans${choice.p}`).innerText = "WRONG!";
                    document.getElementById(`ans${choice.p}`).style.background = "red";
                }
            }
        });
    </script>
</body>
</html>
